<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Autos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- Render principal. -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Encabezado -->
        <div class="bg-blue-600 px-6 py-4">
            <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-2">
                Modelos de Autos
            </h1>
        </div>

        <!-- Cuerpo de página. -->
        <div class="p-6">
            <!-- Formulario de creación de vehículos -->
            <div class="mb-10 bg-gray-50 rounded-xl p-5 border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <span class="w-1 h-6 bg-blue-500 rounded-full"></span> Agregar nuevo auto
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Marca</label>
                        <input type="text" id="marca" placeholder="Ej. Toyota"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Modelo</label>
                        <input type="text" id="modelo" placeholder="Ej. Corolla"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Año</label>
                        <input type="text" id="anio" placeholder="2025"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Precio (MXN)</label>
                        <input type="number" step="0.01" id="precio" placeholder="0.00"
                               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400">
                    </div>
                </div>
                <div class="mt-4 flex justify-end">
                    <button onclick="crearAuto()"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-full shadow-sm transition flex items-center gap-2">
                        Agregar vehículo
                    </button>
                </div>
            </div>

            <!-- Tabla de autos -->
            <div>
                <h2 class="text-lg font-semibold text-gray-700 mb-3 flex items-center gap-2">
                    <span class="w-1 h-6 bg-green-500 rounded-full"></span> Lista de vehículos
                </h2>
                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Marca</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Modelo</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Año</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Precio</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="tablaAutos" class="bg-white divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- inclusión de fragmentos extenros. -->
<div th:replace="~{modals/modal_editar :: modalEditar}"></div>
<script src="/js/autos.js"></script>
</body>
</html>
